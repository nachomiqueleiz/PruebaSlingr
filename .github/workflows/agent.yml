name: Review Agent Pipeline

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  models: read

jobs:
  agent-brain:
    # Se ejecuta solo si es un Pull Request y el comentario contiene la mención al bot
    if: github.event.issue.pull_request && contains(github.event.comment.body, '@AgentRevisar')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar pnpm (Opcional, puedes usar npm)
        run: npm install -g pnpm

      - name: Instalar dependencias
        run: pnpm install

      - name: Ejecutar el cerebro del Agente
        env:
          # Camino único de autenticación para GitHub Models.
          # En Actions tomamos el token del workflow (personal u organización).
          AI_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_BASE_URL: https://models.github.ai/inference
          AI_MODEL: openai/gpt-4.1-mini
          # Le pasamos el texto completo que escribió el programador
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: pnpm agent