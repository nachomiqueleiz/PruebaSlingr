name: Review Agent Pipeline

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
    comment_body:
        description: "Comentario a analizar"
        required: true
        type: string
      pr_number:
        description: "Numero de PR para comentar resultado"
        required: true
        type: string

permissions:
  contents: read
  models: read
  issues: write
  pull-requests: write

jobs:
  agent-brain:
    # Se ejecuta solo cuando la GitHub App lo dispara via repository_dispatch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar pnpm (Opcional, puedes usar npm)
        run: npm install -g pnpm

      - name: Instalar dependencias
        run: pnpm install

      - name: Ejecutar el cerebro del Agente
        id: run-agent
        env:
          # Camino único de autenticación para GitHub Models.
          # En Actions tomamos el token del workflow (personal u organización).
          AI_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_BASE_URL: https://models.github.ai/inference
          AI_MODEL: openai/gpt-4.1-mini
          # Texto del comentario enviado por repository_dispatch o por ejecución manual
          COMMENT_BODY: ${{ github.event.client_payload.comment_body || inputs.comment_body }}
        run: |
          set +e
          output=$(pnpm agent 2>&1)
          exit_code=$?
          echo "$output"

          echo "agent_exit_code=$exit_code" >> "$GITHUB_OUTPUT"

          {
            echo 'agent_output<<EOF'
            echo "$output"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          agent_intent=$(echo "$output" | sed -n 's/^AGENT_INTENT=//p' | tail -n 1)
          agent_summary=$(echo "$output" | sed -n 's/^AGENT_SUMMARY=//p' | tail -n 1)

          echo "agent_intent=${agent_intent:-UNKNOWN}" >> "$GITHUB_OUTPUT"
          echo "agent_summary=${agent_summary:-Sin resumen disponible.}" >> "$GITHUB_OUTPUT"

          exit 0

      - name: Crear token de AgentRevisar App
        if: always()
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AGENT_REVISAR_APP_ID }}
          private-key: ${{ secrets.AGENT_REVISAR_APP_PRIVATE_KEY }}

      - name: Publicar comentario como AgentRevisar App
        if: always() && steps.app-token.outputs.token != ''
        uses: actions/github-script@v7
        env:
          AGENT_EXIT_CODE: ${{ steps.run-agent.outputs.agent_exit_code }}
          AGENT_INTENT: ${{ steps.run-agent.outputs.agent_intent }}
          AGENT_SUMMARY: ${{ steps.run-agent.outputs.agent_summary }}
          AGENT_OUTPUT: ${{ steps.run-agent.outputs.agent_output }}
          TARGET_ISSUE_NUMBER: ${{ github.event.client_payload.issue_number || inputs.issue_number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue_number = Number(process.env.TARGET_ISSUE_NUMBER);
            const exitCode = process.env.AGENT_EXIT_CODE || "1";
            const intent = process.env.AGENT_INTENT || "UNKNOWN";
            const summary = process.env.AGENT_SUMMARY || "Sin resumen disponible.";
            const output = process.env.AGENT_OUTPUT || "";

            if (!issue_number) {
              core.setFailed("Falta TARGET_ISSUE_NUMBER en el payload (issue_number)");
              return;
            }

            let body = "";
            if (exitCode === "0") {
              body = [
                "### Resultado de AgentRevisar",
                "",
                `- Estado: OK`,
                `- Intencion: ${intent}`,
                `- Resumen: ${summary}`
              ].join("\n");
            } else {
              const tail = output.split("\n").slice(-25).join("\n");
              body = [
                "### Resultado de AgentRevisar",
                "",
                `- Estado: ERROR`,
                `- Intencion: ${intent}`,
                `- Resumen: ${summary}`,
                "",
                "Ultimas lineas del log:",
                "```text",
                tail || "Sin salida de log.",
                "```"
              ].join("\n");
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });

      - name: Publicar comentario de fallback (si fallo token de App)
        if: always() && steps.app-token.outputs.token == ''
        uses: actions/github-script@v7
        env:
          AGENT_EXIT_CODE: ${{ steps.run-agent.outputs.agent_exit_code }}
          AGENT_INTENT: ${{ steps.run-agent.outputs.agent_intent }}
          AGENT_SUMMARY: ${{ steps.run-agent.outputs.agent_summary }}
          TARGET_ISSUE_NUMBER: ${{ github.event.client_payload.issue_number || inputs.issue_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = Number(process.env.TARGET_ISSUE_NUMBER);
            const exitCode = process.env.AGENT_EXIT_CODE || "1";
            const intent = process.env.AGENT_INTENT || "UNKNOWN";
            const summary = process.env.AGENT_SUMMARY || "Sin resumen disponible.";

            if (!issue_number) {
              core.setFailed("Falta TARGET_ISSUE_NUMBER en el payload (issue_number)");
              return;
            }

            const body = [
              "### Resultado de AgentRevisar",
              "",
              "No se pudo publicar como AgentRevisar[bot] porque fallo la creacion del token de la GitHub App.",
              "Revisa el secret AGENT_REVISAR_APP_PRIVATE_KEY (formato PEM multilinea).",
              "",
              `- Estado: ${exitCode === "0" ? "OK" : "ERROR"}`,
              `- Intencion: ${intent}`,
              `- Resumen: ${summary}`
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });

      - name: Fallar job si el agente fallo
        if: steps.run-agent.outputs.agent_exit_code != '0'
        run: |
          echo "El agente fallo con codigo ${{ steps.run-agent.outputs.agent_exit_code }}"
          exit 1
